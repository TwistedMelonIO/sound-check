<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sound Check - Activity Log</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@400;700;800;900&family=Syne:wght@400;500;600;700;800&family=Outfit:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="styles.css">
    <style>
        .log-layout {
            position: relative;
            z-index: 10;
            max-width: 960px;
            margin: 0 auto;
            padding: 1.5rem;
        }

        .log-toolbar {
            display: flex;
            align-items: center;
            gap: 0.4rem;
            margin-bottom: 0.75rem;
            flex-wrap: wrap;
        }

        .filter-btn {
            padding: 0.25rem 0.6rem;
            border-radius: 5px;
            border: 1px solid var(--border-secondary);
            background: var(--bg-tertiary);
            color: var(--text-secondary);
            font-family: 'Outfit', sans-serif;
            font-size: 0.7rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.15s ease;
            display: inline-flex;
            align-items: center;
            gap: 0.25rem;
        }

        .filter-btn.active {
            border-color: var(--accent-primary);
            background: rgba(99, 102, 241, 0.15);
            color: var(--accent-primary);
        }

        .filter-btn:hover { border-color: var(--accent-primary); }

        .activity-log-table {
            width: 100%;
            font-size: 0.78rem;
        }

        .activity-log-table th {
            text-align: left;
            padding: 0.35rem 0.6rem;
            color: var(--text-tertiary);
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.62rem;
            border-bottom: 1px solid var(--border-primary);
            position: sticky;
            top: 0;
            background: var(--bg-secondary);
            z-index: 1;
        }

        .activity-log-table td {
            padding: 0.32rem 0.6rem;
            border-bottom: 1px solid var(--border-primary);
            color: var(--text-secondary);
        }

        .activity-log-container {
            max-height: calc(100vh - 260px);
            overflow-y: auto;
        }

        .entry-count {
            font-size: 0.7rem;
            color: var(--text-tertiary);
            margin-left: auto;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <!-- Ambient Background -->
    <div class="ambient-bg">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
        <div class="dot-grid"></div>
        <div class="grain-overlay"></div>
    </div>

    <!-- Header -->
    <header class="app-header">
        <div class="header-inner">
            <div class="header-left">
                <a href="/settings.html" style="text-decoration:none;display:flex;align-items:center;gap:0.5rem;">
                    <i data-lucide="arrow-left" style="width:16px;height:16px;color:var(--text-secondary);"></i>
                    <span class="header-title">Sound Check</span>
                </a>
                <span style="color:var(--text-tertiary);font-size:0.8rem;">Activity Log</span>
            </div>
            <div class="header-right">
                <span style="font-size:0.7rem;color:var(--text-tertiary);">v1.2.0</span>
            </div>
        </div>
    </header>

    <div class="log-layout">
        <div class="card">
            <div class="card-body">
                <div class="log-toolbar">
                    <button class="filter-btn active" data-filter="all" onclick="setFilter('all', this)">All</button>
                    <button class="filter-btn" data-filter="score" onclick="setFilter('score', this)">Score</button>
                    <button class="filter-btn" data-filter="round" onclick="setFilter('round', this)">Round</button>
                    <button class="filter-btn" data-filter="track" onclick="setFilter('track', this)">Track</button>
                    <button class="filter-btn" data-filter="system" onclick="setFilter('system', this)">System</button>
                    <span class="entry-count" id="entryCount"></span>
                    <button class="filter-btn" onclick="exportActivityLog()">
                        <i data-lucide="download" style="width:11px;height:11px;"></i> Export
                    </button>
                    <button class="filter-btn" style="color:var(--accent-danger);border-color:rgba(239,68,68,0.3);" onclick="showResetLogModal()">Reset Log</button>
                </div>
                <div class="activity-log-container">
                    <table class="activity-log-table">
                        <thead>
                            <tr><th>Time</th><th>Type</th><th>Details</th><th>Source</th></tr>
                        </thead>
                        <tbody id="activityLogBody">
                            <!-- Populated by JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <div class="footer-content">
            <div class="footer-left">
                <div class="footer-info">
                    <div class="footer-ports">
                        <span class="footer-port-item">
                            <i data-lucide="globe" style="width:14px;height:14px;"></i>
                            Web: <span>3400</span>
                        </span>
                        <span class="footer-port-item">
                            <i data-lucide="radio" style="width:14px;height:14px;"></i>
                            OSC In: <span>53538</span>
                        </span>
                        <span class="footer-port-item">
                            <i data-lucide="send" style="width:14px;height:14px;"></i>
                            Bridge: <span>3401</span>
                        </span>
                    </div>
                </div>
            </div>
            <div class="footer-logo">
                <a href="https://www.twistedmelon.io" target="_blank" rel="noopener noreferrer">
                    <img src="twistedmelon_logo.png" alt="Twisted Melon" />
                </a>
            </div>
        </div>
    </footer>

    <!-- Reset Log Modal -->
    <div id="resetLogModal" class="modal-overlay">
        <div class="modal-content">
            <h3 style="font-size:1.1rem;font-weight:600;margin:0 0 1rem;">Reset Activity Log</h3>
            <p style="font-size:0.85rem;color:var(--text-secondary);margin:0 0 1rem;">Enter the admin password to clear the activity log.</p>
            <input type="password" id="resetLogPassword" placeholder="Password" style="width:100%;padding:0.6rem 1rem;border-radius:8px;border:1px solid var(--border-secondary);background:var(--bg-tertiary);color:var(--text-primary);font-size:0.9rem;margin-bottom:1rem;">
            <div style="display:flex;gap:0.75rem;">
                <button class="btn-secondary" style="flex:1;" onclick="closeResetLogModal()">Cancel</button>
                <button class="btn-primary" style="flex:1;background:var(--accent-danger);" onclick="executeResetLog()">Reset Log</button>
            </div>
        </div>
    </div>

    <script src="activity.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
